version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: queuemind_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: queuemind
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: queuemind_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: queuemind_web
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5433/queuemind
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=38b97dc3f8c5c7774e1d70d24f0c7de7649d012463e26c62489c628ebfe6a655
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - PROJECT_NAME=QueueMind
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
